version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kipra-postgres
    environment:
      POSTGRES_USER: kipra_admin
      POSTGRES_PASSWORD: kipra_secret_2024
      POSTGRES_DB: kipra_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kipra_admin -d kipra_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kipra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kipra-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://kipra_admin:kipra_secret_2024@postgres:5432/kipra_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: kipra_jwt_super_secret_key_2024
      JWT_REFRESH_SECRET: kipra_refresh_super_secret_key_2024
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ENCRYPTION_KEY: kipra_encryption_key_32chars!!
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kipra-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5001/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

